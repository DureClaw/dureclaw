name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync web/ from packages/
        run: |
          cp packages/agent-daemon/src/index.ts web/agent-daemon.ts
          cp packages/ctl/src/index.ts web/ctl.ts

      - name: Publish scripts as short URLs
        run: |
          # dureclaw.baryon.ai/server  → setup-server.sh
          cp scripts/setup-server.sh web/server
          # dureclaw.baryon.ai/agent   → setup-agent.sh
          cp scripts/setup-agent.sh  web/agent
          # dureclaw.baryon.ai/mcp     → setup-mcp.sh
          cp scripts/setup-mcp.sh    web/mcp

      - name: Upload build artifacts to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_R2_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npm install -g wrangler@latest --silent
          # open-agent-harness.baryon.ai/agent.py → rpi_agent.py (RPi Zero W armv6l)
          wrangler r2 object put open-agent-harness/agent.py \
            --file scripts/rpi_agent.py \
            --content-type "text/x-python" \
            --remote

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
