name: Release — DureClaw Server Binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.3.1)"
        required: true

permissions:
  contents: write   # softprops/action-gh-release needs this to create the Release

jobs:
  build-server:
    name: Build server ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 (M-series)
          - os: darwin
            arch: arm64
            runner: macos-14
          # Linux x86_64
          - os: linux
            arch: x86_64
            runner: ubuntu-22.04
          # Linux arm64
          - os: linux
            arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Build release
        working-directory: packages/phoenix-server
        env:
          MIX_ENV: prod
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod
          mix release harness_server --overwrite

      - name: Package tarball
        working-directory: packages/phoenix-server
        run: |
          TARBALL="oah-server-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          tar -czf "$TARBALL" \
            -C _build/prod/rel \
            harness_server
          echo "TARBALL_PATH=packages/phoenix-server/$TARBALL" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oah-server-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.TARBALL_PATH }}
          retention-days: 7

  build-agent:
    name: Build agent ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: arm64
            runner: macos-14
            bun_target: bun-darwin-arm64
          - os: linux
            arch: x64
            runner: ubuntu-22.04
            bun_target: bun-linux-x64
          - os: linux
            arch: arm64
            runner: ubuntu-22.04-arm
            bun_target: bun-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: packages/agent-daemon
        run: bun install

      - name: Build binary
        working-directory: packages/agent-daemon
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.bun_target }} \
            --outfile=oah-agent-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oah-agent-${{ matrix.os }}-${{ matrix.arch }}
          path: packages/agent-daemon/oah-agent-${{ matrix.os }}-${{ matrix.arch }}
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build-server, build-agent]
    runs-on: ubuntu-latest
    if: always()   # build 일부 실패해도 실행

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/ || echo "(no artifacts)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: DureClaw ${{ github.ref_name || inputs.tag }}
          body: |
            ## DureClaw Server — 사전빌드 바이너리

            Elixir/Erlang 설치 없이 바로 실행 가능합니다.

            ### 자동 설치 (권장)
            ```bash
            bash <(curl -fsSL https://raw.githubusercontent.com/DureClaw/dureclaw/main/scripts/setup-server.sh)
            ```

            ### 수동 설치
            OS/아키텍처에 맞는 파일을 다운로드 후:
            ```bash
            tar -xzf oah-server-darwin-arm64.tar.gz
            ./harness_server/bin/harness_server start
            ```

            | 파일 | 플랫폼 |
            |------|--------|
            | `oah-server-darwin-arm64.tar.gz` | macOS Apple Silicon (M1/M2/M3/M4) |
            | `oah-server-linux-x86_64.tar.gz` | Linux x86_64 |
            | `oah-server-linux-arm64.tar.gz` | Linux arm64 (Raspberry Pi 4/5 64bit) |

            > Intel Mac은 사전빌드 없음 — `bash <(curl ...)` 한 줄 실행 시 자동으로 소스 빌드로 폴백됩니다.

            ### 워커 에이전트 바이너리

            | 파일 | 플랫폼 |
            |------|--------|
            | `oah-agent-darwin-arm64` | macOS Apple Silicon |
            | `oah-agent-linux-x64` | Linux x86_64 |
            | `oah-agent-linux-arm64` | Linux arm64 |
          files: |
            dist/*.tar.gz
            dist/oah-agent-*
          generate_release_notes: true
          fail_on_unmatched_files: false
