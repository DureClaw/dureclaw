services:
  dureclaw:
    image: ghcr.io/dureclaw/dureclaw:latest
    build:
      context: ./packages/phoenix-server
      dockerfile: Dockerfile
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - oah-data:/data
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      OAH_DATA_DIR: /data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  oah-data:
